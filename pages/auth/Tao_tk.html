<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - OTONOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>

    <header>
        <div class="logo">
        <a href="../../">
            <img class="logo-img" src="../../assets/image/logo.png" alt="OTONOW">
        </a>
    </div>
        <div class="header-tools">
            <i class="fa-solid fa-magnifying-glass"></i> 
            <span style="margin: 0 10px">EN / DE</span>
            <div class="menu-btn"><i class="fa-solid fa-bars"></i></div>
        </div>
    </header>

    <div class="main-container">
        
        <div class="left-panel">
            <div class="form-wrapper">
                <h1>Tạo tài khoản</h1>
                <p class="subtitle">Nhập thông tin của bạn để bắt đầu hành trình.</p>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullname">Họ và tên</label>
                        <input type="text" id="fullname" placeholder="Nhập tên đầy đủ của bạn">
                        <span class="error-msg" id="name-error"></span>
                    </div>

                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn">
                        <span class="error-msg" id="email-error"></span>
                    </div>

                    <div class="input-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" placeholder="Nhập mật khẩu của bạn">
                        <span class="error-msg" id="pass-error"></span>
                    </div>

                    <div class="form-actions" style="justify-content: flex-start;">
                        <label class="checkbox-container" style="display: flex; align-items: center; gap: 8px; font-size: 13px;">
                            <input type="checkbox" id="terms" style="margin: 0;"> 
                            <span>Tôi chấp nhận 
                                <a href="#" style="color: #333; font-weight: 600;">Điều khoản & Dịch vụ</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn-login">Đăng ký</button>
                    
                    <button type="button" class="btn-google">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="G" width="20">
                        Đăng ký với Google
                    </button>
                </form>

                <p class="register-link">Đã có tài khoản? <a href="GD_dangnhap.html">Đăng nhập</a></p>
            </div>
        </div> 
        <div class="right-panel">
            <div class="testimonial-box">
    <p class="quote" id="t-quote">“In publishing and graphic design, Lorem ipsum is a placeholder text commonly used to demonstrate the visual form of a document...”</p>
    
    <div class="box-footer">
        <div class="author-info">
            <h3 id="t-author">Sam Kolder</h3>
            <p id="t-location">Los Angeles, California, USA</p>
        </div>

        <div class="right-actions">
            <div class="rating" id="t-rating">
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
                <i class="fa-solid fa-star"></i>
            </div>
            
            <div class="nav-arrows">
                <button class="circle-btn" id="btn-prev"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="circle-btn" id="btn-next"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>
<script src="../../assets/js/slider.js"></script>
        </div>
        </div> 
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname');
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const terms = document.getElementById('terms');
            const nameMsg = document.getElementById('name-error');
            const emailMsg = document.getElementById('email-error');
            const passMsg = document.getElementById('pass-error');

            fullname.classList.remove('error');
            email.classList.remove('error');
            password.classList.remove('error');
            nameMsg.innerText = "";
            emailMsg.innerText = "";
            passMsg.innerText = "";
            nameMsg.classList.remove('show');
            emailMsg.classList.remove('show');
            passMsg.classList.remove('show');

            let hasError = false;
            if (!fullname.value.trim()) {
                fullname.classList.add('error');
                nameMsg.innerText = "Vui lòng nhập họ tên";
                nameMsg.classList.add('show');
                hasError = true;
            }
            if (!email.value.trim() || !email.value.includes('@')) {
                email.classList.add('error');
                emailMsg.innerText = !email.value.trim() ? "Vui lòng nhập email" : "Email không hợp lệ";
                emailMsg.classList.add('show');
                hasError = true;
            }
            if (!password.value.trim() || password.value.length < 6) {
                password.classList.add('error');
                passMsg.innerText = !password.value.trim() ? "Vui lòng nhập mật khẩu" : "Mật khẩu phải có ít nhất 6 ký tự";
                passMsg.classList.add('show');
                hasError = true;
            }
            if (!terms.checked) {
                alert('Bạn cần chấp nhận điều khoản dịch vụ!');
                return;
            }
            if (hasError) return;

            const btn = document.querySelector('.btn-login');
            btn.innerText = 'Đang xử lý...';
            btn.disabled = true;

            fetch('register_process.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ fullname: fullname.value.trim(), email: email.value.trim(), password: password.value })
            })
            .then(res => res.json())
            .then(data => {
                btn.innerText = 'Đăng ký';
                btn.disabled = false;
                if (data.status === 'success') {
                    alert('Đăng ký thành công!');
                    window.location.href = 'GD_dangnhap.html';
                } else {
                    if (data.field === 'email') {
                        email.classList.add('error');
                        emailMsg.innerText = data.message || 'Email đã tồn tại';
                        emailMsg.classList.add('show');
                    } else {
                        alert(data.message || 'Đăng ký thất bại');
                    }
                }
            })
            .catch(() => {
                btn.innerText = 'Đăng ký';
                btn.disabled = false;
                alert('Lỗi kết nối máy chủ. Vui lòng thử lại.');
            });
        });
    </script>
</body>
</html>
