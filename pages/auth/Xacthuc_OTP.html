<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực OTP - OTONOW</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../assets/css/main.css">
    
    <style>
        /* Style cho ô nhập OTP */
        .otp-container {
            display: flex; gap: 10px; justify-content: center; margin: 20px 0;
        }
        .otp-input {
            width: 45px; height: 50px;
            border: 1px solid #ddd; border-radius: 6px;
            text-align: center; font-size: 20px; font-weight: bold;
            outline: none; transition: 0.3s;
        }
        .otp-input:focus {
            border-color: #333; background: #f9f9f9; transform: scale(1.05);
        }
        .otp-input.error {
            border-color: #dc3545; background: #fff8f8;
        }
        .error-text {
            color: #dc3545; font-size: 13px; margin-bottom: 15px;
            display: none; font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="../../index.html">
                <img class="logo-img" src="../../assets/image/logo.png" alt="OTONOW">
            </a>
        </div>
        <div class="header-tools">
            <span style="margin: 0 10px; font-weight: 600; color: #64748B;">EN / DE</span>
        </div>
    </header>

    <div class="main-container">
        
        <div class="left-panel">
            <div class="form-wrapper" style="text-align: center;">
                <h1>Nhập mã xác thực</h1>
                <p class="subtitle">Mã OTP đã được gửi đến email của bạn.</p>

                <form id="otpForm">
                    <div class="otp-container">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 0)" onkeydown="handleBackspace(event, 0)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 1)" onkeydown="handleBackspace(event, 1)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 2)" onkeydown="handleBackspace(event, 2)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 3)" onkeydown="handleBackspace(event, 3)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 4)" onkeydown="handleBackspace(event, 4)">
                        <input type="text" maxlength="1" class="otp-input" oninput="moveToNext(this, 5)" onkeydown="handleBackspace(event, 5)">
                    </div>
                    
                    <p id="otp-error" class="error-text"></p>

                    <button type="submit" class="btn-login">Xác nhận</button>
                </form>

                <p class="register-link">
                    Chưa nhận được mã? <a href="#" onclick="alert('Đã gửi lại mã mới!')">Gửi lại</a>
                </p>
                <p class="register-link" style="margin-top: 10px;">
                    <a href="GD_dangnhap.html">Quay lại đăng nhập</a>
                </p>
            </div>
        </div>

        <div class="right-panel">
            <div class="testimonial-box">
                <p class="quote">“In publishing and graphic design, Lorem ipsum is a placeholder text commonly used to demonstrate the visual form of a document...”</p>
                <div class="box-footer">
                    <div class="author-info">
                        <h3>Sam Kolder</h3>
                        <p>Los Angeles, California, USA</p>
                    </div>
                    <div class="right-actions">
                        <div class="rating">
                            <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Tự động nhảy ô khi nhập
        function moveToNext(field, index) {
            field.value = field.value.replace(/[^0-9]/g, ''); // Chỉ cho nhập số
            
            if (field.value.length >= 1) {
                const allInputs = document.querySelectorAll('.otp-input');
                if (index < 5) {
                    allInputs[index + 1].focus();
                }
            }
        }

        // Xử lý nút Backspace để lùi ô
        function handleBackspace(event, index) {
            if (event.key === "Backspace") {
                const allInputs = document.querySelectorAll('.otp-input');
                if (allInputs[index].value === "" && index > 0) {
                    allInputs[index - 1].focus();
                }
            }
        }

        // 2. Xử lý logic Xác thực OTP
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Chặn load lại trang
            
            // Lấy mã người dùng nhập
            let userOtp = "";
            const inputs = document.querySelectorAll('.otp-input');
            const errorMsg = document.getElementById('otp-error');
            
            // Reset lỗi cũ
            inputs.forEach(i => i.classList.remove('error'));
            errorMsg.style.display = 'none';

            inputs.forEach(input => {
                userOtp += input.value;
            });

            // Kiểm tra độ dài
            if (userOtp.length < 6) {
                errorMsg.innerText = "Vui lòng nhập đủ 6 số!";
                errorMsg.style.display = 'block';
                return;
            }

            fetch('verify_otp.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ otp: userOtp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    const btn = document.querySelector('.btn-login');
                    btn.innerText = 'Đang xác thực...';
                    setTimeout(() => {
                        window.location.href = 'Datlai_MK.html';
                    }, 500);
                } else {
                    errorMsg.innerText = data.message || 'Mã OTP không chính xác. Vui lòng thử lại!';
                    errorMsg.style.display = 'block';
                    inputs.forEach(i => i.classList.add('error'));
                }
            })
            .catch(() => {
                errorMsg.innerText = 'Lỗi kết nối máy chủ. Vui lòng thử lại!';
                errorMsg.style.display = 'block';
            });
        });
    </script>
</body>
</html>
